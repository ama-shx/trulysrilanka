<h3>Book Your Trip</h3>

<form action="https://formspree.io/f/myklwaea" method="POST">

    <input type="email" name="email" placeholder="Email" required><br>

        <option value="">Select Package</option>
        <option value="3-day">3-Day Tour</option>
        <option value="5-day-beach">5-Day Beach</option>
        <option value="7-day-hill">7-Day Hill</option>
        <option value="10-day">10-Day Tour</option>
    </select><br>

    <button type="submit">Submit</button>
</form>
